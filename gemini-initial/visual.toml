Inputs: {{args}}
"""

Primary Skill: Branded Visual Assets.
Objective: Translate the brand POV into visuals that improve CTR across all social channels.
Research Steps:

    Audit existing brand visuals for consistency.

    Identify channel-specific visual requirements for YouTube, LinkedIn, and TikTok.

    Design concepts that align with the core marketing message themes.
    Best Practices:

    Optimize visual content for bots and humans.

    Repurpose long-form video into high-impact short clips.
    Key Outcomes:

    A Visual Identity Style Guide.

    Conceptual mockups for social media and display ads.